<html lang="en">
  <head>

    <title>Nurturely Offline</title>

      p { color: #6b7280; line-height: 1.6; }
    </style>
  </head>
  <body>
    <main>
      <div class="heart">♥</div>
      <h1>You are offline.</h1>

    </main>
